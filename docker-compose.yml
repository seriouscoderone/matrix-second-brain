version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.yaml:/app/config.yaml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
