services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APPSERVICE_PORT:-9090}:${APPSERVICE_PORT:-9090}"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./registration.yaml:/app/registration.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
